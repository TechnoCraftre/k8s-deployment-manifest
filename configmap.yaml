apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-config
  namespace: default
data:
  default.conf: |
    server {
      listen 8080;
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
      location /health {
        access_log off;
        return 200 "healthy\n";
      }
      location /ready {
        access_log off;
        return 200 "ready\n";
      }
    }
